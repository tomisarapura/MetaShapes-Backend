version: '3.8'

services:
  # Base de datos para guardar los usuarios y el estado de los trabajos
  db:
    image: postgres:15-alpine
    container_name: cad_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Almacenamiento S3 local para guardar los .STL y .GLB
  minio:
    image: minio/minio
    container_name: cad_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # API Port (El que usará FastAPI)
      - "9001:9001" # Web UI Port (Para que entres a ver tus archivos)
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data: